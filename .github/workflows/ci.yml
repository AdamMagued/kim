name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: TypeScript + Vite build ──────────────────────────────────────
  frontend:
    name: Frontend (TS + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

  # ── Rust: cargo check + clippy ─────────────────────────────────────────────
  rust:
    name: Rust (cargo check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri requires WebKit2GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

      - name: cargo clippy
        working-directory: desktop/src-tauri
        run: cargo clippy -- -D warnings

  # ── Python: import check + flake8 lint ────────────────────────────────────
  python:
    name: Python (lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install core deps (no heavy playwright/pyautogui)
        run: |
          pip install --upgrade pip
          pip install \
            mcp \
            anthropic \
            openai \
            python-dotenv \
            PyYAML \
            httpx \
            aiofiles \
            flake8

      - name: flake8 lint (orchestrator)
        run: |
          flake8 orchestrator/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv,venv

      - name: Python import check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from orchestrator import memory
          from orchestrator import session_store
          from orchestrator import context_loader
          print('All orchestrator modules import cleanly.')
          "
